<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Plan de Turno — El Rincón del Barril</title>
<style>
:root {
  --rojo:#C0392B; --rojo2:#a93226; --fondo:#0e0e0e; --fondo2:#181818;
  --fondo3:#222; --borde:#2c2c2c; --txt:#f0f0f0; --txt2:#888;
  --verde:#27ae60; --ambar:#e67e22; --azul:#2980b9; --rosa:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--fondo);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:70px;font-size:15px}
/* HEADER */
.hdr{background:var(--fondo2);border-bottom:2px solid var(--rojo);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.hdr-logo{font-size:24px}
.hdr-info{flex:1}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:var(--txt2)}
.hdr-fecha{font-size:11px;color:var(--txt2);text-align:right;line-height:1.5}
/* AREA TABS */
.area-row{background:var(--fondo2);border-bottom:1px solid var(--borde);display:flex;overflow-x:auto;padding:0 8px;gap:2px;scrollbar-width:none}
.area-row::-webkit-scrollbar{display:none}
.atab{padding:10px 14px;font-size:13px;font-weight:700;color:var(--txt2);cursor:pointer;white-space:nowrap;border:none;background:none;border-bottom:3px solid transparent;transition:.2s}
.atab.on{color:var(--txt);border-bottom-color:var(--rojo)}
.atab.add{opacity:.5;font-size:12px}
/* PERSON CHIPS */
.prow{padding:8px 12px;display:flex;gap:6px;overflow-x:auto;border-bottom:1px solid var(--borde);scrollbar-width:none;background:var(--fondo)}
.prow::-webkit-scrollbar{display:none}
.pchip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--fondo3);color:var(--txt2);border:1px solid var(--borde);white-space:nowrap;transition:.15s}
.pchip.on{background:var(--rojo);color:#fff;border-color:var(--rojo)}
/* DAY TABS */
.drow{display:flex;border-bottom:1px solid var(--borde);background:var(--fondo2)}
.dtab{flex:1;padding:9px 4px;text-align:center;font-size:11px;font-weight:800;color:var(--txt2);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;letter-spacing:.5px;transition:.2s}
.dtab.on{color:var(--txt);border-bottom-color:var(--rojo)}
.dtab.today{color:var(--ambar)}
.dtab.today.on{border-bottom-color:var(--ambar)}
.dtab.off{opacity:.3}
/* SHIFT TABS */
.srow{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--borde);background:var(--fondo)}
.stab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--fondo3);color:var(--txt2);border:1px solid var(--borde);transition:.15s;white-space:nowrap}
.stab.on{background:var(--fondo2);color:var(--txt);border-color:#444}
/* CONTENT */
.content{padding:12px;max-width:600px;margin:0 auto}
/* TASK */
.tlist{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.titem{background:var(--fondo2);border:1px solid var(--borde);border-radius:10px;padding:12px 13px;transition:.2s}
.titem.done{border-color:rgba(39,174,96,.4);background:rgba(39,174,96,.04)}
.titem.novedad{border-left:3px solid var(--ambar)}
.ttop{display:flex;align-items:flex-start;gap:10px}
.tcheck{width:26px;height:26px;min-width:26px;border-radius:50%;border:2px solid var(--borde);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.2s;background:none;color:transparent}
.tcheck.done{background:var(--verde);border-color:var(--verde);color:#fff}
.tinfo{flex:1}
.tnombre{font-size:14px;font-weight:500;line-height:1.4}
.titem.done .tnombre{text-decoration:line-through;color:var(--txt2)}
.tbadges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:.3px}
.br{background:rgba(192,57,43,.18);color:#e07070;border:1px solid rgba(192,57,43,.25)}
.ba{background:rgba(41,128,185,.18);color:#70b0e0;border:1px solid rgba(41,128,185,.25)}
.bsin{background:rgba(255,255,255,.05);color:var(--txt2);border:1px solid var(--borde)}
.thora{font-size:11px;color:var(--verde);margin-top:3px}
.tnovtxt{font-size:12px;color:var(--ambar);margin-top:4px;padding:4px 8px;background:rgba(230,126,34,.1);border-radius:4px;border-left:2px solid var(--ambar)}
.tacts{display:flex;gap:6px;margin-top:8px}
.tbtn{padding:4px 10px;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer;border:1px solid var(--borde);background:var(--fondo3);color:var(--txt2)}
.tbtn.nov{border-color:rgba(230,126,34,.4);color:var(--ambar)}
.tbtn.del{border-color:rgba(192,57,43,.3);color:#e07070}
.novform{display:none;gap:6px;margin-top:7px}
.novform.open{display:flex}
.novinput{flex:1;background:var(--fondo3);border:1px solid var(--ambar);border-radius:6px;padding:6px 10px;color:var(--txt);font-size:13px;outline:none}
.novok{padding:6px 12px;background:var(--ambar);color:#000;border:none;border-radius:6px;font-weight:800;font-size:12px;cursor:pointer}
/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;background:rgba(14,14,14,.97);border-top:1px solid var(--borde);padding:10px 10px;display:flex;gap:7px;z-index:50;backdrop-filter:blur(8px)}
.bbar button{flex:1;padding:11px 6px;border-radius:10px;font-weight:800;font-size:12px;cursor:pointer;border:1px solid}
.btn-aus{background:rgba(230,126,34,.12);border-color:rgba(230,126,34,.4);color:var(--ambar)}
.btn-wa{background:rgba(37,211,102,.12);border-color:rgba(37,211,102,.35);color:#25d366}
.btn-adm{background:rgba(255,255,255,.04);border-color:var(--borde);color:var(--txt2);flex:0 0 46px!important}
/* OVERLAY */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto}
.ov.open{display:block}
.panel{background:var(--fondo2);border-radius:16px 16px 0 0;margin-top:48px;min-height:calc(100vh - 48px);padding:18px 14px}
.pnl-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.pnl-title{font-size:18px;font-weight:800;flex:1}
.btn-close{width:32px;height:32px;border-radius:50%;background:var(--fondo3);border:1px solid var(--borde);color:var(--txt);font-size:14px;cursor:pointer}
/* PIN */
.pin-wrap{text-align:center;padding:30px 20px}
.pin-sub{font-size:13px;color:var(--txt2);margin-bottom:20px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--borde);background:transparent;transition:.15s}
.pin-dot.on{background:var(--rojo);border-color:var(--rojo)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:270px;margin:0 auto}
.pkey{padding:15px;background:var(--fondo3);border:1px solid var(--borde);border-radius:10px;font-size:20px;font-weight:700;color:var(--txt);cursor:pointer;user-select:none;transition:.1s}
.pkey:active{background:var(--rojo);transform:scale(.94)}
.pkey.del{font-size:14px;color:var(--txt2)}
.pin-err{color:var(--rojo);font-size:13px;margin-top:10px;min-height:18px}
/* ADMIN SECTIONS */
.adm-sec{margin-bottom:18px}
.adm-sec-title{font-size:11px;font-weight:800;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--borde)}
.adm-row{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--fondo3);border-radius:8px;margin-bottom:5px}
.adm-input{flex:1;background:var(--fondo);border:1px solid var(--borde);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:14px;outline:none}
.adm-input:focus{border-color:var(--rojo)}
.btn-save{padding:8px 14px;background:var(--rojo);color:#fff;border:none;border-radius:6px;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap}
.btn-sec{padding:8px 12px;background:var(--fondo3);color:var(--txt);border:1px solid var(--borde);border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
.btn-danger{padding:7px 12px;background:transparent;color:#e07070;border:1px solid rgba(192,57,43,.4);border-radius:6px;font-weight:700;font-size:12px;cursor:pointer}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--fondo3);border-radius:8px;padding:11px 8px;text-align:center}
.stat-n{font-size:26px;font-weight:900}
.stat-l{font-size:10px;color:var(--txt2);margin-top:2px}
/* TASK EDIT ROW */
.te-row{display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--borde)}
.te-name{flex:1;font-size:13px}
.ab-btn{padding:3px 8px;font-size:11px;font-weight:800;border-radius:4px;cursor:pointer;border:1px solid var(--borde);background:var(--fondo3);color:var(--txt2);min-width:30px;text-align:center;transition:.1s}
.ab-btn.r{background:rgba(192,57,43,.2);color:#e07070;border-color:rgba(192,57,43,.3)}
.ab-btn.a{background:rgba(41,128,185,.2);color:#70b0e0;border-color:rgba(41,128,185,.3)}
/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal.open{display:flex}
.mbox{background:var(--fondo2);border-radius:14px;padding:22px 18px;width:100%;max-width:360px;border:1px solid var(--borde)}
.mtitle{font-size:16px;font-weight:800;margin-bottom:14px}
.msel,.mtxt,.minput{width:100%;background:var(--fondo3);border:1px solid var(--borde);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:14px;margin-bottom:9px;outline:none}
.msel:focus,.mtxt:focus,.minput:focus{border-color:var(--rojo)}
.mtxt{resize:vertical;min-height:72px}
.mbtns{display:flex;gap:8px;margin-top:2px}
.mbtns button{flex:1;padding:12px;border-radius:8px;font-weight:800;font-size:14px;cursor:pointer}
.mconfirm{background:var(--ambar);color:#000;border:none}
.mcancel{background:var(--fondo3);color:var(--txt2);border:1px solid var(--borde)}
.mconfirm-r{background:var(--rojo);color:#fff;border:none}
/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e1e1e;color:var(--txt);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid var(--borde);opacity:0;transition:.3s;z-index:400;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* MENU */
.menu-day{background:var(--fondo3);border:1px solid var(--borde);border-radius:10px;padding:12px 13px;margin-bottom:8px}
.menu-day.hoy{border-color:var(--rojo);background:rgba(192,57,43,.06)}
.menu-day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.menu-day-label{font-size:11px;font-weight:800;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase}
.menu-day-label.hoy{color:var(--ambar)}
.menu-plato{font-size:15px;font-weight:700;flex:1;margin-bottom:6px}
.menu-porciones{display:flex;align-items:center;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.por-est{background:rgba(41,128,185,.18);color:#70b0e0;border:1px solid rgba(41,128,185,.25);padding:3px 10px;border-radius:6px;font-size:12px;font-weight:800}
.por-real{background:rgba(39,174,96,.18);color:#7de0a0;border:1px solid rgba(39,174,96,.25);padding:3px 10px;border-radius:6px;font-size:12px;font-weight:800}
.por-real-inp{width:60px;background:var(--fondo);border:1px solid var(--verde);border-radius:6px;padding:4px 8px;color:var(--txt);font-size:13px;outline:none;text-align:center}
.menu-bebidas{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.beb-tag{padding:2px 9px;background:rgba(155,89,182,.18);color:#c39be0;border:1px solid rgba(155,89,182,.25);border-radius:12px;font-size:11px;font-weight:700}
.ing-list{display:flex;flex-direction:column;gap:4px;margin-bottom:7px}
.ing-item{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--fondo2);border-radius:6px;border:1px solid var(--borde)}
.ing-check{width:22px;height:22px;min-width:22px;border-radius:50%;border:2px solid var(--borde);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;background:none;transition:.15s;color:transparent}
.ing-check.ok{background:var(--verde);border-color:var(--verde);color:#fff}
.ing-check.falta{background:rgba(192,57,43,.25);border-color:var(--rojo);color:#e07070}
.ing-nombre{flex:1;font-size:13px}
.ing-nombre.falta{text-decoration:line-through;color:var(--txt2)}
.menu-obs-inp{width:100%;background:var(--fondo);border:1px solid var(--borde);border-radius:6px;padding:7px 10px;color:var(--txt);font-size:13px;outline:none;resize:none;min-height:52px;margin-top:4px}
.menu-obs-inp:focus{border-color:var(--ambar)}
.sem-obs-box{background:rgba(41,128,185,.08);border:1px solid rgba(41,128,185,.2);border-radius:8px;padding:9px 11px;font-size:12px;color:#90c0e0;margin-bottom:10px;line-height:1.5}
.menu-sec-label{font-size:11px;font-weight:800;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.sem-selector{display:flex;gap:5px;margin-bottom:12px}
.sem-btn{flex:1;padding:8px 4px;text-align:center;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;background:var(--fondo3);color:var(--txt2);border:1px solid var(--borde)}
.sem-btn.on{background:var(--rojo);color:#fff;border-color:var(--rojo)}
/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--txt2);font-size:14px}
.empty .ico{font-size:38px;margin-bottom:10px}
.aus-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:rgba(230,126,34,.08);border-radius:8px;border:1px solid rgba(230,126,34,.25);margin-bottom:5px}
.aus-nom{font-weight:800;font-size:13px;color:var(--ambar)}
.aus-mot{font-size:12px;color:var(--txt2);flex:1}
.aus-hora{font-size:11px;color:var(--txt2);white-space:nowrap}
.persona-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--fondo3);border:1px solid var(--borde);border-radius:20px;font-size:12px;margin:3px}
.persona-tag button{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:13px;padding:0;line-height:1}
/* ADD TASK INPUT */
.add-task-row{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--borde)}
.add-task-row input{flex:1;background:var(--fondo3);border:1px solid var(--borde);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:13px;outline:none}
.add-task-row input:focus{border-color:var(--verde)}
.add-task-row button{padding:8px 12px;background:var(--verde);border:none;border-radius:6px;color:#fff;font-weight:800;font-size:13px;cursor:pointer}
.adm-area-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.adm-area-chip{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:var(--fondo3);color:var(--txt2);border:1px solid var(--borde)}
.adm-area-chip.on{background:var(--rojo);color:#fff;border-color:var(--rojo)}
.adm-sub-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.adm-sub-tab{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;background:var(--fondo3);color:var(--txt2);border:1px solid var(--borde)}
.adm-sub-tab.on{background:#333;color:var(--txt);border-color:#555}
</style>
    <!-- Firebase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-database-compat.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">🔥</div>
  <div class="hdr-info">
    <div class="hdr-title">Plan de Turno</div>
    <div class="hdr-sub">El Rincón del Barril · TodoPosibleMD</div>
  </div>
  <div class="hdr-fecha" id="hdr-fecha"></div>
</div>

<div class="area-row" id="area-row"></div>
<div class="prow" id="prow"></div>
<div class="drow" id="drow"></div>
<div class="srow" id="srow"></div>
<div class="content" id="content"></div>

<div class="bbar">
  <button class="btn-aus" onclick="openAusencia()">🙋 Reportar ausencia</button>
  <button class="btn-wa" onclick="sendWA()">📲 Enviar a Sergio</button>
  <button class="btn-adm" onclick="openMenu()" style="flex:0 0 46px;background:rgba(155,89,182,.12);border-color:rgba(155,89,182,.35);color:#c39be0">🍽️</button>
  <button class="btn-adm" onclick="openAdmin()">⚙️</button>
</div>

<!-- ADMIN OVERLAY -->
<div class="ov" id="adm-ov">
  <div class="panel">
    <div id="pin-sec">
      <div class="pnl-hdr">
        <div class="pnl-title">🔐 Acceso Admin</div>
        <button class="btn-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="pin-wrap">
        <div class="pin-sub">Ingresa el PIN de administrador</div>
        <div class="pin-dots" id="pin-dots">
          <div class="pin-dot" id="pd0"></div>
          <div class="pin-dot" id="pd1"></div>
          <div class="pin-dot" id="pd2"></div>
          <div class="pin-dot" id="pd3"></div>
        </div>
        <div class="pin-pad">
          <div class="pkey" onclick="pinKey('1')">1</div><div class="pkey" onclick="pinKey('2')">2</div><div class="pkey" onclick="pinKey('3')">3</div>
          <div class="pkey" onclick="pinKey('4')">4</div><div class="pkey" onclick="pinKey('5')">5</div><div class="pkey" onclick="pinKey('6')">6</div>
          <div class="pkey" onclick="pinKey('7')">7</div><div class="pkey" onclick="pinKey('8')">8</div><div class="pkey" onclick="pinKey('9')">9</div>
          <div class="pkey" style="opacity:.3"></div><div class="pkey" onclick="pinKey('0')">0</div><div class="pkey del" onclick="pinDel()">⌫</div>
        </div>
        <div class="pin-err" id="pin-err"></div>
      </div>
    </div>
    <div id="adm-sec" style="display:none"></div>
  </div>
</div>

<!-- AUSENCIA MODAL -->
<div class="modal" id="aus-modal">
  <div class="mbox">
    <div class="mtitle">🙋 Reportar ausencia</div>
    <select class="msel" id="aus-persona"></select>
    <textarea class="mtxt" id="aus-motivo" placeholder="Motivo de la ausencia..."></textarea>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('aus-modal')">Cancelar</button>
      <button class="mconfirm" onclick="submitAusencia()">Reportar</button>
    </div>
  </div>
</div>

<!-- ADD AREA MODAL -->
<div class="modal" id="add-area-modal">
  <div class="mbox">
    <div class="mtitle">➕ Nueva área</div>
    <input class="minput" id="new-area-nombre" placeholder="Nombre (ej: Bar, Bodega...)">
    <input class="minput" id="new-area-emoji" placeholder="Emoji (ej: 🍺)">
    <input class="minput" id="new-area-personas" placeholder="Personas separadas por coma">
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('add-area-modal')">Cancelar</button>
      <button class="mconfirm-r" onclick="submitAddArea()">Crear</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal" id="confirm-modal">
  <div class="mbox">
    <div class="mtitle" id="confirm-title">¿Confirmar?</div>
    <p style="font-size:13px;color:var(--txt2);margin-bottom:16px" id="confirm-msg"></p>
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal('confirm-modal')">Cancelar</button>
      <button class="mconfirm-r" id="confirm-ok" onclick="">Confirmar</button>
    </div>
  </div>
</div>


<!-- MENU OVERLAY -->
<div class="ov" id="menu-ov">
  <div class="panel">
    <div class="pnl-hdr">
      <div class="pnl-title">🍽️ Menú del personal</div>
      <button class="btn-close" onclick="closeMenu()">✕</button>
    </div>
    <div id="menu-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const TL = {manana:'☀️ Mañana', tarde:'🌤️ Tarde', noche:'🌙 Noche'};

const FB_PATH_TURNO = 'rincon-barril/turno/';

// Cache en memoria
let fbCache_turno = { data: null, cfg: null, menu: null, reg: {}, menuReg: {} };

// Guardar en Firebase de forma async
function fbSaveTurno(subkey, value) {
  if (!db_turno) return;
  // Antes de guardar, proteger arrays vacíos con marcador para que Firebase no los elimine
  var valorProtegido = protegerArraysVacios(value);
  db_turno.ref(FB_PATH_TURNO + subkey).set(valorProtegido)
    .catch(e => console.warn('FB turno write error:', subkey, e));
}

// Reemplaza [] por '__EMPTY_ARRAY__' para que Firebase no los elimine
function protegerArraysVacios(obj) {
  if (obj === null || obj === undefined) return obj;
  if (Array.isArray(obj)) {
    if (obj.length === 0) return '__EMPTY_ARRAY__';
    return obj.map(function(item) { return protegerArraysVacios(item); });
  }
  if (typeof obj === 'object') {
    var result = {};
    Object.keys(obj).forEach(function(k) {
      result[k] = protegerArraysVacios(obj[k]);
    });
    return result;
  }
  return obj;
}

// Convierte '__EMPTY_ARRAY__' de vuelta a []
function restaurarArraysVacios(obj) {
  if (obj === '__EMPTY_ARRAY__') return [];
  if (obj === null || obj === undefined) return obj;
  if (Array.isArray(obj)) {
    return obj.map(function(item) { return restaurarArraysVacios(item); });
  }
  if (typeof obj === 'object') {
    var result = {};
    Object.keys(obj).forEach(function(k) {
      result[k] = restaurarArraysVacios(obj[k]);
    });
    return result;
  }
  return obj;
}

// Cargar todo desde Firebase antes de init
async function cargarDesdeFirebaseTurno() {
  if (!db_turno) return;
  try {
    const snap = await db_turno.ref(FB_PATH_TURNO).get();
    if (snap.exists()) {
      const d = snap.val();
      if (d.data)    fbCache_turno.data    = restaurarArraysVacios(d.data);
      if (d.cfg)     fbCache_turno.cfg     = d.cfg;
      if (d.menu)    fbCache_turno.menu    = restaurarArraysVacios(d.menu);
      if (d.reg)     fbCache_turno.reg     = d.reg;
      if (d.menuReg) fbCache_turno.menuReg = restaurarArraysVacios(d.menuReg);
    }
  } catch(e) { console.warn('FB turno load error:', e); }
}

let data, cfg, reg;
let curArea=0, curDia='mie', curTurno='tarde', curPersona='Todos';
let adminUnlocked=false, pinBuf='';
let admEditArea=0, admEditDia='mie', admEditTurno='tarde';

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function loadAll(){
  // Priorizar Firebase cache, fallback a localStorage
  try{data = fbCache_turno.data || JSON.parse(localStorage.getItem(STORAGE_DATA)) || JSON.parse(JSON.stringify(DEFAULT_DATA));}
  catch{data=JSON.parse(JSON.stringify(DEFAULT_DATA));}
  // Reconstruir turnos que Firebase pudo haber eliminado por tener tareas vacías
  if(data && data.areas){
    data.areas.forEach(function(area){
      if(!area.dias) return;
      Object.keys(area.dias).forEach(function(dKey){
        var dia = area.dias[dKey];
        if(!dia.turnos) dia.turnos = {};
        TO.forEach(function(tr){
          if(!dia.turnos[tr]) dia.turnos[tr] = {tareas:[]};
          else if(!dia.turnos[tr].tareas) dia.turnos[tr].tareas = [];
          else if(typeof dia.turnos[tr].tareas === 'object' && !Array.isArray(dia.turnos[tr].tareas)){
            // Firebase convirtió array a objeto — revertir
            var keys = Object.keys(dia.turnos[tr].tareas);
            dia.turnos[tr].tareas = keys.map(function(k){ return dia.turnos[tr].tareas[k]; });
          }
        });
      });
    });
  }
  try{cfg = fbCache_turno.cfg || JSON.parse(localStorage.getItem(STORAGE_CFG)) || {whatsapp:'573118483339',pin:'2604'};}
  catch{cfg={whatsapp:'573118483339',pin:'2604'};}
  const tk = todayKey();
  try{reg = (fbCache_turno.reg && fbCache_turno.reg[tk]) || JSON.parse(localStorage.getItem(STORAGE_REG+tk)) || {done:{},novedades:{},ausencias:[]};}
  catch{reg={done:{},novedades:{},ausencias:[]};}
}
function saveData(){
  localStorage.setItem(STORAGE_DATA,JSON.stringify(data));
  fbCache_turno.data = data;
  fbSaveTurno('data', data);
}
function saveCfg(){
  localStorage.setItem(STORAGE_CFG,JSON.stringify(cfg));
  fbCache_turno.cfg = cfg;
  fbSaveTurno('cfg', cfg);
}
function saveReg(){
  const tk = todayKey();
  localStorage.setItem(STORAGE_REG+tk,JSON.stringify(reg));
  if (!fbCache_turno.reg) fbCache_turno.reg = {};
  fbCache_turno.reg[tk] = reg;
  fbSaveTurno('reg/' + tk, reg);
}
function hora(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init(){
  loadAll();
  loadMenu();
  // Auto-detect today
  const dow=new Date().getDay();
  if(DOW[dow]) curDia=DOW[dow]; else curDia='mie';
  // Auto-detect shift
  const h=new Date().getHours();
  if(h<14) curTurno='manana'; else if(h<19) curTurno='tarde'; else curTurno='noche';
  // Ensure valid turno for dia
  const area=data.areas[curArea];
  const dia=area&&area.dias[curDia];
  if(dia&&!dia.turnos[curTurno]){
    const available=TO.filter(tr=>dia.turnos[tr]);
    if(available.length) curTurno=available[0];
  }
  // Update header date
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const now=new Date();
  document.getElementById('hdr-fecha').innerHTML=days[now.getDay()]+'<br>'+now.getDate()+' '+months[now.getMonth()];
  renderAll();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll(){renderAreaTabs();renderPersonFilter();renderDayTabs();renderShiftTabs();renderTasks();}

function renderAreaTabs(){
  const el=document.getElementById('area-row');
  el.innerHTML=data.areas.map((a,i)=>`<button class="atab${i===curArea?' on':''}" onclick="selArea(${i})">${a.emoji} ${a.nombre}</button>`).join('')
    +'<button class="atab add" onclick="openModal(\'add-area-modal\')">＋ Área</button>';
}

function renderPersonFilter(){
  const area=data.areas[curArea];
  const el=document.getElementById('prow');
  el.innerHTML=`<div class="pchip${curPersona==='Todos'?' on':''}" onclick="selPersona('Todos')">Todos</div>`
    +area.personas.map(p=>`<div class="pchip${curPersona===p?' on':''}" onclick="selPersona('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('');
}

function renderDayTabs(){
  const el=document.getElementById('drow');
  const dow=new Date().getDay(); const today=DOW[dow];
  el.innerHTML=DIAS.map(d=>{
    const isToday=d===today;
    const on=d===curDia?' on':'';
    const tod=isToday?' today':'';
    return`<button class="dtab${on}${tod}" onclick="selDia('${d}')">${DL[d]}${isToday?'<br><span style="font-size:9px;color:inherit">●</span>':''}</button>`;
  }).join('');
}

function renderShiftTabs(){
  const area=data.areas[curArea];
  const dia=area.dias[curDia];
  const el=document.getElementById('srow');
  if(!dia){el.innerHTML='';return;}
  // Mostrar siempre los 3 turnos — si no existe en data, se muestra vacío
  el.innerHTML=TO.map(tr=>`<button class="stab${curTurno===tr?' on':''}" onclick="selTurno('${tr}')">${TL[tr]}</button>`).join('');
}

function renderTasks(){
  const area=data.areas[curArea];
  const dia=area&&area.dias[curDia];
  // Asegurar que el turno existe en memoria
  if(dia){
    if(!dia.turnos) dia.turnos={};
    if(!dia.turnos[curTurno]) dia.turnos[curTurno]={tareas:[]};
    normalizarTareas(dia.turnos[curTurno]);
  }
  const turno=dia&&dia.turnos[curTurno];
  const el=document.getElementById('content');
  if(!turno){
    // Crear el turno vacío en memoria si no existe
    if(dia && !dia.turnos) dia.turnos = {};
    if(dia && !dia.turnos[curTurno]) dia.turnos[curTurno] = {tareas:[]};
    el.innerHTML=`<div class="empty"><div class="ico">📋</div>Este turno no tiene tareas aún.<br><span style="font-size:12px">Entra en ⚙️ Admin para agregar tareas.</span></div>`;
    return;
  }
  normalizarTareas(turno);
  let tareas=turno.tareas;
  if(curPersona!=='Todos') tareas=tareas.filter(ta=>ta.asignaciones.some(a=>a.persona===curPersona));
  if(tareas.length===0){
    el.innerHTML=`<div class="empty"><div class="ico">👤</div>No hay tareas asignadas a <strong>${curPersona}</strong> en este turno.<br><span style="font-size:12px;margin-top:6px;display:block">Sergio puede asignar tareas desde ⚙️ Admin.</span></div>`;
    return;
  }
  const ausencias=reg.ausencias||[];
  let html='';
  if(ausencias.length){
    html+=`<div style="background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.3);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:12px">
      <span style="font-weight:800;color:var(--ambar)">🙋 Ausencias hoy:</span> `
      +ausencias.map(a=>`<strong>${a.persona}</strong>${a.motivo?' — '+a.motivo:''}`).join(' · ')+'</div>';
  }
  html+=`<div class="tlist">${tareas.map(ta=>renderTask(ta)).join('')}</div>`;
  el.innerHTML=html;
}

function renderTask(ta){
  const d=reg.done[ta.id];
  const nov=reg.novedades[ta.id];
  const isDone=d&&d.done;
  const badges=ta.asignaciones
    .filter(a=>curPersona==='Todos'||a.persona!==curPersona)
    .map(a=>`<span class="badge b${a.rol.toLowerCase()}">${a.persona} — ${a.rol}</span>`).join('');
  const sinAsig=ta.asignaciones.length===0?`<span class="badge bsin">Sin asignar</span>`:'';
  return`<div class="titem${isDone?' done':''}${nov?' novedad':''}" id="ti_${ta.id}">
    <div class="ttop">
      <button class="tcheck${isDone?' done':''}" onclick="toggleDone('${ta.id}')">${isDone?'✓':''}</button>
      <div class="tinfo">
        <div class="tnombre">${ta.tarea}</div>
        <div class="tbadges">${badges}${sinAsig}</div>
        ${isDone?`<div class="thora">✓ Hecho ${d.hora}${d.persona&&d.persona!=='Todos'?' — '+d.persona:''}</div>`:''}
        ${nov?`<div class="tnovtxt">⚠️ ${nov}</div>`:''}
      </div>
    </div>
    <div class="tacts">
      <button class="tbtn nov" onclick="toggleNovForm('${ta.id}')">⚠️ Novedad</button>
    </div>
    <div class="novform" id="nf_${ta.id}">
      <input class="novinput" id="ni_${ta.id}" placeholder="Describe la novedad..." value="${nov||''}">
      <button class="novok" onclick="saveNov('${ta.id}')">OK</button>
    </div>
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function selArea(i){curArea=i;curPersona='Todos';const area=data.areas[i];const dia=area.dias[curDia];if(dia){const avail=TO.filter(tr=>dia.turnos[tr]);if(avail.length&&!dia.turnos[curTurno])curTurno=avail[0];}renderAll();}
function selPersona(p){curPersona=p;renderPersonFilter();renderTasks();}
function selDia(d){curDia=d;const area=data.areas[curArea];const dia=area.dias[d];if(dia){const avail=TO.filter(tr=>dia.turnos[tr]);if(avail.length&&!dia.turnos[curTurno])curTurno=avail[0];}renderShiftTabs();renderTasks();}
function selTurno(tr){
  curTurno=tr;
  // Asegurar que el turno existe en data
  const area=data.areas[curArea];
  if(area && area.dias[curDia]){
    if(!area.dias[curDia].turnos) area.dias[curDia].turnos={};
    if(!area.dias[curDia].turnos[tr]) area.dias[curDia].turnos[tr]={tareas:[]};
  }
  renderShiftTabs();
  renderTasks();
}

function toggleDone(id){
  if(!reg.done[id]||!reg.done[id].done){
    reg.done[id]={done:true,hora:hora(),persona:curPersona};
    toast('✓ Marcado como hecho');
  } else {
    delete reg.done[id];
  }
  saveReg();renderTasks();
}

function toggleNovForm(id){
  const f=document.getElementById('nf_'+id);
  if(f){f.classList.toggle('open');if(f.classList.contains('open'))document.getElementById('ni_'+id).focus();}
}

function saveNov(id){
  const v=document.getElementById('ni_'+id).value.trim();
  if(v)reg.novedades[id]=v; else delete reg.novedades[id];
  saveReg();toast('⚠️ Novedad guardada');renderTasks();
}

function submitAusencia(){
  const persona=document.getElementById('aus-persona').value;
  const motivo=document.getElementById('aus-motivo').value.trim();
  if(!reg.ausencias)reg.ausencias=[];

function sendWA(){
  const area=data.areas[curArea];
  const dia=area.dias[curDia];
  const turno=dia&&dia.turnos[curTurno];
  if(!turno){toast('No hay tareas en este turno');return;}
  normalizarTareas(turno);
  let tareas=turno.tareas;
  if(curPersona!=='Todos') tareas=tareas.filter(ta=>ta.asignaciones.some(a=>a.persona===curPersona));
  const hechas=tareas.filter(ta=>reg.done[ta.id]&&reg.done[ta.id].done);
  const conNov=tareas.filter(ta=>reg.novedades[ta.id]);
  const pendientes=tareas.filter(ta=>!reg.done[ta.id]||!reg.done[ta.id].done);
  const now=new Date();
  let msg=`📋 *REPORTE — El Rincón del Barril*\n`;
  msg+=`📍 Área: ${area.emoji} ${area.nombre}\n`;
  msg+=`📅 ${DO_FULL[curDia]} · ${TL[curTurno].replace(/[☀️🌤️🌙]/g,'').trim()}\n`;
  if(curPersona!=='Todos') msg+=`👤 Reporta: ${curPersona}\n`;
  msg+=`🕐 Enviado: ${hora()}\n\n`;
  if(reg.ausencias&&reg.ausencias.length){
    msg+=`🙋 *AUSENCIAS:*\n`;
    reg.ausencias.forEach(a=>msg+=`• ${a.persona}${a.motivo?' — '+a.motivo:''}\n`);
    msg+='\n';
  }
  if(hechas.length){
    msg+=`✅ *COMPLETADO (${hechas.length}):*\n`;
    hechas.forEach(ta=>{const d=reg.done[ta.id];msg+=`• ${ta.tarea}${d.hora?' — '+d.hora:''}\n`;});
    msg+='\n';
  }
  if(conNov.length){
    msg+=`⚠️ *CON NOVEDAD:*\n`;
    conNov.forEach(ta=>msg+=`• ${ta.tarea}\n  → ${reg.novedades[ta.id]}\n`);
    msg+='\n';
  }
  const sinHacer=pendientes.filter(ta=>!reg.novedades[ta.id]);
  if(sinHacer.length){
    msg+=`❌ *PENDIENTE (${sinHacer.length}):*\n`;
    sinHacer.forEach(ta=>msg+=`• ${ta.tarea}\n`);
  }
  // Menu info
  const sem=menuData.semanaActiva; const diaMenuObj=menuData.semanas[sem]&&menuData.semanas[sem][curDia];
  const mreg=menuReg[curDia]||{};
  if(diaMenuObj){
    msg+='\n🍽️ *MENÚ PERSONAL:*\n';
    msg+=`• ${diaMenuObj.plato}\n`;
    msg+=`• Porciones estimadas: ${diaMenuObj.estimado}`;
    if(mreg.real!=null) msg+=` | Preparadas: ${mreg.real}`;
    msg+='\n';
    const faltantes=(mreg.ing||[]).filter(x=>x.falta).map(x=>x.nombre);
    if(faltantes.length) msg+=`⚠️ Ingredientes faltantes: ${faltantes.join(', ')}\n`;
    if(mreg.obs) msg+=`📝 Obs. menú: ${mreg.obs}\n`;
  }
  const url=`https://wa.me/${cfg.whatsapp}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

// Normaliza tareas y asignaciones que Firebase convirtió de array a objeto
function normalizarTareas(turno) {
  if (!turno) return;
  if (!turno.tareas) { turno.tareas = []; return; }
  // Convertir objeto Firebase a array si es necesario
  if (!Array.isArray(turno.tareas)) {
    var keys = Object.keys(turno.tareas);
    if (keys.length === 0) { turno.tareas = []; return; }
    turno.tareas = keys.sort(function(a,b){return parseInt(a)-parseInt(b);}).map(function(k){ return turno.tareas[k]; });
  }
  // Normalizar asignaciones dentro de cada tarea
  turno.tareas.forEach(function(ta) {
    if (!ta) return;
    if (!ta.asignaciones) { ta.asignaciones = []; return; }
    if (!Array.isArray(ta.asignaciones)) {
      var aKeys = Object.keys(ta.asignaciones);
      if (aKeys.length === 0) { ta.asignaciones = []; return; }
      ta.asignaciones = aKeys.sort(function(a,b){return parseInt(a)-parseInt(b);}).map(function(k){ return ta.asignaciones[k]; });
    }
  });
}

function cycleRol(taskId,persona){
  const area=data.areas[admEditArea];
  const turno=area.dias[admEditDia].turnos[admEditTurno];
  const ta=turno.tareas.find(x=>x.id===taskId);
  if(!ta)return;
  const idx=ta.asignaciones.findIndex(x=>x.persona===persona);
  if(idx===-1){ta.asignaciones.push({persona,rol:'R'});}
  else if(ta.asignaciones[idx].rol==='R'){ta.asignaciones[idx].rol='A';}
  else{ta.asignaciones.splice(idx,1);}
  saveData();renderAdminPanel();renderTasks();
}

let menuData, menuReg;

function normalizarMenu(menuObj) {
  if (!menuObj || !menuObj.semanas) return menuObj;
  // Reconstruir días que Firebase eliminó por tener arrays vacíos
  [1,2,3,4].forEach(function(s) {
    if (!menuObj.semanas[s]) menuObj.semanas[s] = { obs: '' };
    DIAS.forEach(function(d) {
      if (!menuObj.semanas[s][d]) {
        menuObj.semanas[s][d] = { plato: '', estimado: 0, bebidas: [], ingredientes: [] };
      } else {
        // Normalizar arrays que Firebase convirtió a objetos
        ['bebidas','ingredientes'].forEach(function(campo) {
          if (!menuObj.semanas[s][d][campo]) {
            menuObj.semanas[s][d][campo] = [];
          } else if (!Array.isArray(menuObj.semanas[s][d][campo])) {
            var ks = Object.keys(menuObj.semanas[s][d][campo]);
            menuObj.semanas[s][d][campo] = ks.sort(function(a,b){return parseInt(a)-parseInt(b);}).map(function(k){return menuObj.semanas[s][d][campo][k];});
          }
        });
      }
    });
  });
  if (!menuObj.opciones) menuObj.opciones = [];
  else if (!Array.isArray(menuObj.opciones)) {
    var ks = Object.keys(menuObj.opciones);
    menuObj.opciones = ks.sort(function(a,b){return parseInt(a)-parseInt(b);}).map(function(k){return menuObj.opciones[k];});
  }
  return menuObj;
}

function loadMenu(){
  const tk = todayKey();
  try{ menuData = normalizarMenu(fbCache_turno.menu || JSON.parse(localStorage.getItem(STORAGE_MENU)) || JSON.parse(JSON.stringify(DEFAULT_MENU))); }
  catch{ menuData = JSON.parse(JSON.stringify(DEFAULT_MENU)); }
  try{ menuReg = (fbCache_turno.menuReg && fbCache_turno.menuReg[tk]) || JSON.parse(localStorage.getItem(STORAGE_MENU_REG+tk)) || {}; }
  catch{ menuReg = {}; }
  // ensure all dias have bebidas array
  [1,2,3,4].forEach(s=>{
    DIAS.forEach(d=>{
      if(menuData.semanas[s]&&menuData.semanas[s][d]&&!menuData.semanas[s][d].bebidas)
        menuData.semanas[s][d].bebidas=[];
    });
  });
}

  loadMenu();
  document.getElementById('menu-ov').classList.add('open');
  renderMenuPanel();
}
function closeMenu(){ document.getElementById('menu-ov').classList.remove('open'); }

function renderMenuPanel(){
  const sem = menuData.semanaActiva;
  const semObj = menuData.semanas[sem];
  const dow = new Date().getDay(); const todayDia = DOW[dow];
  let html = '';
  // Semana selector
  html += '<div class="menu-sec-label">Semana activa</div>';
  html += '<div class="sem-selector">';
  [1,2,3,4].forEach(s=> html += `<div class="sem-btn${s===sem?' on':''}" onclick="cambiarSemanaMenu(${s})">${s}</div>`);
  html += '</div>';
  // Obs semana
  if(semObj.obs){
    html += `<div class="sem-obs-box">📌 ${semObj.obs}</div>`;
  }
  // Bebidas globales
  if(menuData.bebidas&&menuData.bebidas.length){
    html += `<div style="margin-bottom:10px"><div class="menu-sec-label" style="margin-bottom:5px">Bebidas</div>`;
    html += `<div class="menu-bebidas">${menuData.bebidas.map(b=>`<span class="beb-tag">🥤 ${b}</span>`).join('')}</div></div>`;
  }
  // Days
  DIAS.forEach(d=>{
    // Crear el día en memoria si Firebase lo eliminó
    if(!semObj[d]) semObj[d] = { plato: '', estimado: 0, bebidas: [], ingredientes: [] };
    const dia = semObj[d];
    const esHoy = d===todayDia;
    const mreg = menuReg[d]||{};
    const faltantes = (mreg.ing||[]).filter(x=>x.falta).map(x=>x.nombre);
    html += `<div class="menu-day${esHoy?' hoy':''}">`;
    html += `<div class="menu-day-hdr"><span class="menu-day-label${esHoy?' hoy':''}">${DO_FULL[d]}${esHoy?' — HOY':''}</span></div>`;
    html += `<div class="menu-plato">🍽️ ${dia.plato}</div>`;
    // Porciones
    html += `<div class="menu-porciones"><span class="por-est">📊 Estimado: ${dia.estimado}</span>`;
    if(mreg.real!=null) html += `<span class="por-real">✓ Real: ${mreg.real}</span>`;
    html += '</div>';
    // Ingredientes
    if(dia.ingredientes&&dia.ingredientes.length){
      html += `<div class="menu-sec-label">Ingredientes</div><div class="ing-list">`;
      dia.ingredientes.forEach((ing,i)=>{
        const ireg = (mreg.ing||[]).find(x=>x.nombre===ing);
        const estado = ireg ? ireg.falta ? 'falta' : 'ok' : '';
        const icon = ireg ? ireg.falta ? '✕' : '✓' : '';
        html += `<div class="ing-item">
          <button class="ing-check ${estado}" onclick="toggleIng('${d}','${ing.replace(/'/g,"\'")}',${i})">${icon}</button>
          <span class="ing-nombre${ireg&&ireg.falta?' falta':''}">${ing}</span>
        </div>`;
      });
      html += '</div>';
    }
    // Obs día
    const obsVal = mreg.obs||'';
    html += `<div class="menu-sec-label">Observación del día</div>`;
    html += `<textarea class="menu-obs-inp" id="mobs_${d}" placeholder="Novedad, cambio, faltante..."
      onblur="saveMenuObsDia('${d}')">${obsVal}</textarea>`;
    // Real porciones (only editable today)
    if(esHoy){
      html += `<div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--txt2)">Porciones preparadas:</span>
        <input type="number" class="por-real-inp" id="por_real_${d}" value="${mreg.real!=null?mreg.real:''}"
          min="0" placeholder="0" onchange="saveMenuReal('${d}',this.value)">
      </div>`;
    }
    html += '</div>';
  });
  document.getElementById('menu-content').innerHTML = html;
}

function toggleIng(dia, ing, idx){
  if(!menuReg[dia]) menuReg[dia]={};
  if(!menuReg[dia].ing) menuReg[dia].ing=[];
  const ex = menuReg[dia].ing.find(x=>x.nombre===ing);
  if(!ex){ menuReg[dia].ing.push({nombre:ing, falta:true}); }
  else if(ex.falta){ ex.falta=false; }
  else { menuReg[dia].ing = menuReg[dia].ing.filter(x=>x.nombre!==ing); }
  saveMenuReg(); renderMenuPanel();
}

function saveMenuObsDia(dia){
  const v = document.getElementById('mobs_'+dia);
  if(!v) return;
  if(!menuReg[dia]) menuReg[dia]={};
  menuReg[dia].obs = v.value.trim();
  saveMenuReg();
}

function saveMenuReal(dia, val){
  if(!menuReg[dia]) menuReg[dia]={};
  menuReg[dia].real = val!==''?parseInt(val):null;
  saveMenuReg();
}

// ─── ADMIN MENU SECTION ───────────────────────────────────────────────────────
function renderAdminMenuSection(){
  const sem = menuData.semanaActiva;
  const semObj = menuData.semanas[sem];
  let html = `<div class="adm-sec"><div class="adm-sec-title">🍽️ Menú del personal</div>`;
  // Semana activa
  html += `<div style="margin-bottom:10px"><div style="font-size:12px;color:var(--txt2);margin-bottom:5px">Semana activa</div>
    <div class="sem-selector">`;
  [1,2,3,4].forEach(s=> html += `<div class="sem-btn${s===sem?' on':''}" onclick="setMenuSem(${s})">${s}</div>`);
  html += '</div></div>';
  // Obs semana
  html += `<div class="adm-row"><span style="font-size:12px;color:var(--txt2);white-space:nowrap">📌 Obs. semana</span>
    <input class="adm-input" id="sem-obs-input" value="${(semObj.obs||'').replace(/"/g,'&quot;')}" placeholder="Observación general de la semana">
    <button class="btn-save" onclick="saveMenuSemObs()">OK</button></div>`;
  // Days editor
  DIAS.forEach(d=>{
    const dia = semObj[d];
    if(!dia) return;
    html += `<div style="margin-bottom:12px;padding:10px;background:var(--fondo3);border-radius:8px;border:1px solid var(--borde)">`;
    html += `<div style="font-size:12px;font-weight:800;margin-bottom:8px;color:var(--ambar)">${DO_FULL[d]}</div>`;
    // Plato
    html += `<div style="margin-bottom:6px"><select class="adm-input" id="plato_${d}" style="margin-bottom:4px" onchange="menuPlatoChange('${d}',this.value)">`;
    menuData.opciones.forEach(op=> html += `<option${op===dia.plato?' selected':''}>${op}</option>`);
    html += `<option value="__otro">Otro...</option></select>`;
    html += `<input class="adm-input" id="plato_custom_${d}" style="display:${menuData.opciones.includes(dia.plato)?'none':'block'}" value="${menuData.opciones.includes(dia.plato)?'':dia.plato}" placeholder="Escribe el plato..."></div>`;
    // Estimado
    html += `<div class="adm-row" style="margin-bottom:6px"><span style="font-size:12px;color:var(--txt2)">Porciones estimadas</span>
      <input type="number" class="adm-input" id="est_${d}" value="${dia.estimado}" min="1" style="max-width:80px">
      <button class="btn-save" onclick="saveMenuDia('${d}')">OK</button></div>`;
    // Bebidas del día
    html += `<div style="margin-bottom:6px"><div class="menu-sec-label" style="margin-bottom:4px">Bebidas del día</div>`;
    if(dia.bebidas&&dia.bebidas.length){
      html += `<div class="menu-bebidas">${dia.bebidas.map(b=>`<span class="beb-tag">${b} <button onclick="removeDiaBebida('${d}','${b.replace(/'/g,"\'")}') " style="background:none;border:none;color:inherit;cursor:pointer;font-size:11px">✕</button></span>`).join('')}</div>`;
    }
    html += `<div style="display:flex;gap:5px;margin-top:4px"><select class="adm-input" id="beb_sel_${d}" style="flex:1">`;
    (menuData.bebidas||[]).forEach(b=> html += `<option>${b}</option>`);
    html += `</select><button class="btn-save" onclick="addDiaBebida('${d}')">＋</button></div></div>`;
    // Ingredientes
    html += `<div><div class="menu-sec-label" style="margin-bottom:4px">Ingredientes</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:5px">`;
    (dia.ingredientes||[]).forEach((ing,i)=> html += `<div style="display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 6px;background:var(--fondo2);border-radius:5px">
      <span style="flex:1">${ing}</span>
      <button onclick="removeIng('${d}',${i})" style="background:none;border:none;color:#e07070;cursor:pointer;font-size:13px">✕</button></div>`);
    html += `</div><div style="display:flex;gap:5px"><input class="adm-input" id="ning_${d}" placeholder="Agregar ingrediente...">
      <button class="btn-save" onclick="addIng('${d}')">＋</button></div></div>`;
    html += '</div>';
  });
  // Bebidas globales
  html += `<div style="margin-bottom:10px"><div class="adm-sec-title" style="margin-top:8px">🥤 Bebidas disponibles</div>`;
  html += `<div class="menu-bebidas" style="margin-bottom:8px">${(menuData.bebidas||[]).map(b=>`<span class="beb-tag">${b} <button onclick="removeGlobalBebida('${b.replace(/'/g,"\'")}') " style="background:none;border:none;color:inherit;cursor:pointer">✕</button></span>`).join('')}</div>`;
  html += `<div class="adm-row"><input class="adm-input" id="new-beb" placeholder="Nueva bebida..."><button class="btn-save" onclick="addGlobalBebida()">＋</button></div></div>`;
  // Opciones banco
  html += `<div><div class="adm-sec-title">📋 Banco de opciones</div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${menuData.opciones.map(op=>`<span style="padding:3px 9px;background:var(--fondo3);border:1px solid var(--borde);border-radius:6px;font-size:12px">${op} <button onclick="removeOpcion('${op.replace(/'/g,"\'")}') " style="background:none;border:none;color:var(--txt2);cursor:pointer">✕</button></span>`).join('')}</div>`;
  html += `<div class="adm-row"><input class="adm-input" id="new-opcion" placeholder="Nueva opción de comida..."><button class="btn-save" onclick="addOpcion()">＋</button></div></div>`;
  html += '</div>';
  return html;
}

function setMenuSem(s){ menuData.semanaActiva=s; saveMenu(); renderAdminPanel(); }
function cambiarSemanaMenu(s){ menuData.semanaActiva=s; saveMenu(); renderMenuPanel(); }
function saveMenuSemObs(){ const v=document.getElementById('sem-obs-input'); if(v){ menuData.semanas[menuData.semanaActiva].obs=v.value.trim(); saveMenu(); toast('✓ Observación guardada'); } }

function menuPlatoChange(dia, val){
  const custom=document.getElementById('plato_custom_'+dia);
  if(custom) custom.style.display = val==='__otro'?'block':'none';
}

function saveMenuDia(dia){
  const sem=menuData.semanaActiva; const d=menuData.semanas[sem][dia];
  const platoSel=document.getElementById('plato_'+dia);
  const platoCustom=document.getElementById('plato_custom_'+dia);
  const est=document.getElementById('est_'+dia);
  if(platoSel&&platoCustom&&est){
    d.plato = platoSel.value==='__otro' ? platoCustom.value.trim() : platoSel.value;
    d.estimado = parseInt(est.value)||5;
    saveMenu(); toast('✓ Guardado'); renderAdminPanel();
  }
}

function addIng(dia){
  const inp=document.getElementById('ning_'+dia); if(!inp||!inp.value.trim()) return;
  menuData.semanas[menuData.semanaActiva][dia].ingredientes.push(inp.value.trim());
  saveMenu(); inp.value=''; renderAdminPanel();
}
function removeIng(dia,i){
  menuData.semanas[menuData.semanaActiva][dia].ingredientes.splice(i,1);
  saveMenu(); renderAdminPanel();
}

function addDiaBebida(dia){
  const sel=document.getElementById('beb_sel_'+dia); if(!sel) return;
  const d=menuData.semanas[menuData.semanaActiva][dia];
  if(!d.bebidas) d.bebidas=[];
  if(!d.bebidas.includes(sel.value)){ d.bebidas.push(sel.value); saveMenu(); renderAdminPanel(); }
}
function removeDiaBebida(dia, beb){
  const d=menuData.semanas[menuData.semanaActiva][dia];
  d.bebidas=(d.bebidas||[]).filter(b=>b!==beb); saveMenu(); renderAdminPanel();
}

function addGlobalBebida(){
  const inp=document.getElementById('new-beb'); if(!inp||!inp.value.trim()) return;
  if(!menuData.bebidas.includes(inp.value.trim())){ menuData.bebidas.push(inp.value.trim()); saveMenu(); inp.value=''; renderAdminPanel(); }
}
function removeGlobalBebida(beb){ menuData.bebidas=menuData.bebidas.filter(b=>b!==beb); saveMenu(); renderAdminPanel(); }

function addOpcion(){
  const inp=document.getElementById('new-opcion'); if(!inp||!inp.value.trim()) return;
  if(!menuData.opciones.includes(inp.value.trim())){ menuData.opciones.push(inp.value.trim()); saveMenu(); inp.value=''; renderAdminPanel(); }
}
function removeOpcion(op){ menuData.opciones=menuData.opciones.filter(o=>o!==op); saveMenu(); renderAdminPanel(); }
